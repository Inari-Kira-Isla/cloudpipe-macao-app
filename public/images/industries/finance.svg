  <rect x="52" y="88" width="10" height="62" rx="2" fill="none" stroke="#c5a572" stroke-width="3"/>
  <rect x="78" y="88" width="10" height="62" rx="2" fill="none" stroke="#c5a572" stroke-width="3"/>
  <rect x="112" y="88" width="10" height="62" rx="2" fill="none" stroke="#c5a572" stroke-width="3"/>
  <rect x="138" y="88" width="10" height="62" rx="2" fill="none" stroke="#c5a572" stroke-width="3"/>
  <!-- Column capitals -->
  <rect x="49" y="86" width="16" height="5" rx="1" fill="#c5a572" opacity="0.6"/>
  <rect x="75" y="86" width="16" height="5" rx="1" fill="#c5a572" opacity="0.6"/>
  <rect x="109" y="86" width="16" height="5" rx="1" fill="#c5a572" opacity="0.6"/>
  <rect x="135" y="86" width="16" height="5" rx="1" fill="#c5a572" opacity="0.6"/>
