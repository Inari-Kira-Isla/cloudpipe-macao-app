<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" rx="24" fill="#1a1a2e"/>
  <!-- Cocktail glass -->
  <path d="M62 58 L100 105 L138 58" fill="none" stroke="#c5a572" stroke-width="4" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Liquid level -->
  <path d="M72 72 L100 105 L128 72 Z" fill="#c5a572" opacity="0.2"/>
  <!-- Glass rim -->
  <line x1="58" y1="58" x2="142" y2="58" stroke="#c5a572" stroke-width="4" stroke-linecap="round"/>
  <!-- Stem -->
  <line x1="100" y1="105" x2="100" y2="148" stroke="#c5a572" stroke-width="4" stroke-linecap="round"/>
  <!-- Base -->
  <path d="M78 148 L122 148" stroke="#c5a572" stroke-width="5" stroke-linecap="round"/>
  <!-- Olive/cherry on toothpick -->
  <line x1="115" y1="50" x2="115" y2="80" stroke="#c5a572" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="115" cy="75" r="5" fill="#c5a572"/>
  <!-- Moon crescent -->
  <path d="M148 38 Q158 48 158 62 Q158 76 148 86 Q152 76 152 62 Q152 48 148 38 Z" fill="#c5a572" opacity="0.7"/>
  <!-- Stars -->
  <circle cx="50" cy="42" r="2" fill="#c5a572" opacity="0.5"/>
  <circle cx="62" cy="35" r="1.5" fill="#c5a572" opacity="0.4"/>
  <circle cx="140" cy="32" r="1.5" fill="#c5a572" opacity="0.4"/>
</svg>