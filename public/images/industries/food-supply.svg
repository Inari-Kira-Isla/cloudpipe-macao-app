  <circle cx="140" cy="100" r="2" fill="#c5a572" opacity="0.3"/>
  <circle cx="60" cy="98" r="2" fill="#c5a572" opacity="0.3"/>
  <circle cx="100" cy="82" r="2" fill="#c5a572" opacity="0.3"/>
