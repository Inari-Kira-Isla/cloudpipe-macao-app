  <path d="M30 108 Q30 90 52 87 Q68 90 68 100" fill="none" stroke="#c5a572" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <!-- Right person -->
  <circle cx="148" cy="70" r="11" fill="none" stroke="#c5a572" stroke-width="3" opacity="0.7"/>
  <path d="M132 100 Q132 90 148 87 Q170 90 170 108" fill="none" stroke="#c5a572" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <!-- Houses row -->
  <!-- House 1 (left) -->
  <path d="M32 140 L52 122 L72 140" fill="none" stroke="#c5a572" stroke-width="2.5" stroke-linejoin="round"/>
  <rect x="38" y="138" width="28" height="22" rx="2" fill="none" stroke="#c5a572" stroke-width="2.5"/>
  <rect x="47" y="146" width="10" height="14" rx="1" fill="#c5a572" opacity="0.3"/>
