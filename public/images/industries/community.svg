  <path d="M74 138 L100 118 L126 138" fill="none" stroke="#c5a572" stroke-width="2.5" stroke-linejoin="round"/>
  <rect x="80" y="136" width="40" height="26" rx="2" fill="none" stroke="#c5a572" stroke-width="2.5"/>
  <rect x="93" y="144" width="14" height="18" rx="1" fill="#c5a572" opacity="0.3"/>
  <!-- House 3 (right) -->
  <path d="M128 140 L148 122 L168 140" fill="none" stroke="#c5a572" stroke-width="2.5" stroke-linejoin="round"/>
  <rect x="134" y="138" width="28" height="22" rx="2" fill="none" stroke="#c5a572" stroke-width="2.5"/>
  <rect x="143" y="146" width="10" height="14" rx="1" fill="#c5a572" opacity="0.3"/>
  <!-- Connection dots between people -->
  <circle cx="75" cy="72" r="1.5" fill="#c5a572" opacity="0.4"/>
  <circle cx="125" cy="72" r="1.5" fill="#c5a572" opacity="0.4"/>
