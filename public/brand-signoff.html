<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CloudPipe 品牌事實核實 · 回簽問卷</title>
<style>
  :root{
    --bg:#f4f5f7; --card:#ffffff; --ink:#1d2433; --ink2:#5a6577; --line:#e2e6ec;
    --brand:#1f5fbf; --brand-d:#16458c; --ok:#1f9d55; --ok-bg:#e7f6ec;
    --red:#d23b3b; --red-bg:#fbe9e9; --amber:#e07a13; --amber-bg:#fdefe0;
    --yellow:#caa007; --yellow-bg:#fbf5dc; --green:#1f9d55; --green-bg:#e7f6ec;
    --shadow:0 1px 3px rgba(20,30,55,.08),0 6px 20px rgba(20,30,55,.06);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Microsoft JhengHei","Helvetica Neue",Arial,"Noto Sans CJK TC",sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.6; -webkit-font-smoothing:antialiased;
  }
  /* ---------- Layout ---------- */
  header.topbar{
    background:linear-gradient(120deg,var(--brand-d),var(--brand));
    color:#fff; padding:18px 22px;
  }
  .topbar h1{margin:0;font-size:20px;font-weight:700;letter-spacing:.3px}
  .topbar .sub{font-size:12.5px;opacity:.9;margin-top:3px}
  .topbar .meta-row{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px}
  .topbar .meta-row label{font-size:11.5px;display:flex;flex-direction:column;gap:3px;opacity:.95}
  .topbar .meta-row input{
    border:0;border-radius:6px;padding:6px 9px;font-size:13px;min-width:150px;color:var(--ink);
  }
  .layout{display:flex;align-items:flex-start;max-width:1180px;margin:0 auto;gap:0}
  /* sidebar */
  nav.side{
    width:230px;flex:0 0 230px;padding:16px 12px;position:sticky;top:0;align-self:flex-start;
  }
  .progress-overall{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px 13px;margin-bottom:14px;box-shadow:var(--shadow)}
  .progress-overall .pct{font-size:26px;font-weight:800;color:var(--brand)}
  .progress-overall .lbl{font-size:11.5px;color:var(--ink2)}
  .bar{height:7px;border-radius:5px;background:#e7ebf1;overflow:hidden;margin-top:7px}
  .bar > i{display:block;height:100%;background:var(--ok);width:0;transition:width .3s}
  .navlist{list-style:none;margin:0;padding:0}
  .navlist li{
    display:flex;justify-content:space-between;align-items:center;gap:6px;
    padding:9px 11px;border-radius:8px;cursor:pointer;font-size:13.5px;margin-bottom:3px;border:1px solid transparent;
  }
  .navlist li:hover{background:#eef2f8}
  .navlist li.active{background:#e7eefb;border-color:#cdddf7;color:var(--brand-d);font-weight:700}
  .navlist li .cnt{font-size:11px;color:var(--ink2);font-variant-numeric:tabular-nums;white-space:nowrap}
  .navlist li.done-all .cnt{color:var(--ok);font-weight:700}
  /* main */
  main.main{flex:1;min-width:0;padding:16px 18px 60px}
  .brandhead{display:flex;flex-wrap:wrap;justify-content:space-between;align-items:flex-end;gap:10px;margin-bottom:4px}
  .brandhead h2{margin:0;font-size:18px}
  .brandhead .bdesc{font-size:12.5px;color:var(--ink2)}
  .toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:12px 0 16px}
  .toolbar .spacer{flex:1}
  button.btn{
    font:inherit;font-size:13px;border:1px solid var(--line);background:#fff;color:var(--ink);
    padding:7px 13px;border-radius:8px;cursor:pointer;font-weight:600;
  }
  button.btn:hover{background:#f0f3f8}
  button.btn.primary{background:var(--brand);border-color:var(--brand);color:#fff}
  button.btn.primary:hover{background:var(--brand-d)}
  button.btn.ghost{background:transparent}
  button.btn:disabled{opacity:.45;cursor:not-allowed}
  .toggle{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .toggle button{border:0;background:#fff;padding:7px 14px;font:inherit;font-size:13px;cursor:pointer;font-weight:600;color:var(--ink2)}
  .toggle button.on{background:var(--brand);color:#fff}
  /* notice box */
  .notice{
    background:#fff8ec;border:1px solid #f3dca6;border-radius:9px;padding:11px 13px;font-size:12.5px;color:#7a5a13;margin-bottom:14px;
  }
  /* ---------- Question card ---------- */
  .qcard{
    background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);
    padding:20px 22px;margin-bottom:16px;
  }
  .qcard.compact{padding:16px 18px}
  .qtop{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-bottom:10px}
  .qid{font-weight:800;font-size:14px;color:var(--brand-d);background:#eef2fb;border:1px solid #d6e2f7;border-radius:6px;padding:2px 9px}
  .badge{font-size:11.5px;font-weight:700;border-radius:20px;padding:3px 11px;border:1px solid transparent;white-space:nowrap}
  .badge.s-red{background:var(--red-bg);color:var(--red);border-color:#f3c4c4}
  .badge.s-amber{background:var(--amber-bg);color:var(--amber);border-color:#f6d2a8}
  .badge.s-yellow{background:var(--yellow-bg);color:#9a7c05;border-color:#ecdd9a}
  .badge.s-green{background:var(--green-bg);color:var(--green);border-color:#bce5cb}
  .badge.s-gray{background:#eef0f3;color:var(--ink2);border-color:#dfe3e9}
  .cat{font-size:11.5px;color:var(--ink2);background:#f1f3f6;border-radius:6px;padding:2px 8px}
  .qtitle{font-size:15px;font-weight:700;margin:2px 0 8px}
  .claimbox{
    background:#f8fafc;border:1px solid #e7ecf2;border-left:3px solid var(--brand);border-radius:8px;
    padding:10px 13px;font-size:13.5px;color:#33425b;margin-bottom:14px;white-space:pre-wrap;
  }
  .claimbox .lab{font-size:11px;color:var(--ink2);font-weight:700;display:block;margin-bottom:3px}
  /* conflict A/B versions */
  .versions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
  .ver{border:1px solid #e7ecf2;border-radius:8px;padding:9px 11px;font-size:13px;background:#fbfcfe}
  .ver .vt{font-size:10.5px;font-weight:800;letter-spacing:.5px;color:var(--ink2);margin-bottom:3px;text-transform:uppercase}
  .ver.va{border-left:3px solid #6f86c9}
  .ver.vb{border-left:3px solid #c98a6f}
  /* answer area */
  .ans{margin-top:4px}
  .opts{display:flex;flex-direction:column;gap:7px}
  .opt{
    display:flex;align-items:flex-start;gap:9px;border:1px solid var(--line);border-radius:9px;
    padding:9px 12px;cursor:pointer;font-size:13.5px;transition:border-color .15s,background .15s;
  }
  .opt:hover{background:#f6f8fc}
  .opt input{margin-top:3px;flex:0 0 auto;width:16px;height:16px;accent-color:var(--brand)}
  .opt.sel-confirm{border-color:var(--ok);background:var(--ok-bg)}
  .opt.sel-edit{border-color:var(--brand);background:#eef4ff}
  .opt.sel-delete{border-color:var(--red);background:var(--red-bg)}
  .opt .ot{font-weight:600}
  .opt .od{font-size:12px;color:var(--ink2);font-weight:400}
  .cond{margin:9px 0 2px;display:none}
  .cond.show{display:block}
  .cond label{display:block;font-size:12px;font-weight:600;color:var(--ink2);margin-bottom:4px}
  .cond input[type=text], .cond textarea{
    width:100%;font:inherit;font-size:13.5px;border:1px solid var(--line);border-radius:8px;padding:8px 11px;color:var(--ink);
  }
  .cond textarea{min-height:54px;resize:vertical}
  .cond input:focus,.cond textarea:focus{outline:2px solid #bcd2f7;border-color:var(--brand)}
  .truthval{margin:0 0 12px;background:#eef4ff;border:1px solid #cfe0fb;border-radius:8px;padding:10px 12px}
  .truthval label{font-weight:700;color:var(--brand-d);font-size:12.5px}
  /* wizard footer */
  .wizfoot{display:flex;justify-content:space-between;align-items:center;margin-top:18px;gap:10px}
  .wizfoot .stepinfo{font-size:12.5px;color:var(--ink2)}
  /* done flag on nav-less cards */
  .answered-flag{font-size:11.5px;color:var(--ok);font-weight:700}
  /* completion page */
  .complete{background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);padding:26px 28px}
  .complete h2{margin-top:0}
  .declare{background:#f8fafc;border:1px solid #e7ecf2;border-radius:9px;padding:14px 16px;font-size:13.5px;margin:14px 0}
  .sig-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:8px}
  .sig-grid label{font-size:12px;font-weight:600;color:var(--ink2);display:block;margin-bottom:5px}
  .sig-grid input{width:100%;font:inherit;border:1px solid var(--line);border-radius:8px;padding:9px 11px;font-size:14px}
  .sig-line{border-bottom:1.5px solid var(--ink);height:34px}
  .summary-tbl{width:100%;border-collapse:collapse;margin-top:10px;font-size:13px}
  .summary-tbl th,.summary-tbl td{border:1px solid var(--line);padding:7px 10px;text-align:left}
  .summary-tbl th{background:#f1f4f8}
  .pillbar{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0 0}
  .pill{font-size:11.5px;border-radius:20px;padding:2px 10px;font-weight:600}
  .pill.c{background:var(--ok-bg);color:var(--ok)} .pill.e{background:#eef4ff;color:var(--brand)} .pill.d{background:var(--red-bg);color:var(--red)} .pill.u{background:#eef0f3;color:var(--ink2)}
  footer.foot{max-width:1180px;margin:0 auto;padding:14px 18px 30px;font-size:11.5px;color:var(--ink2)}
  .saved-tip{font-size:11.5px;color:var(--ok)}
  /* responsive */
  @media (max-width:860px){
    .layout{flex-direction:column}
    nav.side{width:100%;flex:none;position:static;padding:12px 14px 0}
    .navlist{display:flex;flex-wrap:wrap;gap:6px}
    .navlist li{margin:0;flex:1 1 auto;min-width:120px}
    main.main{padding:8px 14px 50px}
    .versions{grid-template-columns:1fr}
    .sig-grid{grid-template-columns:1fr}
  }
  /* print */
  @media print{
    body{background:#fff}
    header.topbar{background:#16458c !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
    nav.side,.toolbar,.wizfoot,.saved-tip{display:none !important}
    .layout{display:block;max-width:none}
    main.main{padding:0}
    .qcard{box-shadow:none;page-break-inside:avoid;border:1px solid #bbb}
    .badge,.opt,.claimbox,.ver{-webkit-print-color-adjust:exact;print-color-adjust:exact}
    #printAll .qcard{margin-bottom:10px}
  }
</style>
</head>
<body>
<header class="topbar">
  <h1>CloudPipe 品牌事實核實 · 回簽問卷</h1>
  <div class="sub">每一條對外「事實」AI 都會吸收做品牌定義。冇人手核實過嘅 claim = 假 VERIFIED。請逐條回簽 → 寫入 brand_facts 單一真相表。生成日期：2026-06-21</div>
  <div class="meta-row">
    <label>回簽人（姓名）<input type="text" id="metaSigner" placeholder="例：卓浩澤"></label>
    <label>職銜 / 角色<input type="text" id="metaRole" placeholder="例：負責人"></label>
    <label>回簽日期<input type="text" id="metaDate" placeholder="YYYY-MM-DD"></label>
    <label>聯絡（電話/Email）<input type="text" id="metaContact" placeholder="選填"></label>
  </div>
</header>

<div class="layout">
  <nav class="side">
    <div class="progress-overall">
      <div class="pct"><span id="ovPct">0</span>%</div>
      <div class="lbl">全問卷已回簽 <span id="ovDone">0</span> / <span id="ovTotal">0</span> 條</div>
      <div class="bar"><i id="ovBar"></i></div>
    </div>
    <ul class="navlist" id="navList"></ul>
  </nav>

  <main class="main" id="mainArea"></main>
</div>

<footer class="foot">
  回簽結果只存於你本機瀏覽器（localStorage），不會上傳。完成後請按「匯出 JSON」交回 CloudPipe，或「列印 / 存 PDF」作正式存檔。
  <span class="saved-tip" id="savedTip"></span>
</footer>

   ========================================================= */
const LS_KEY = "cloudpipe_brand_signoff_v1";
let answers = {};          // { qid: {choice, source, edit, truth} }
let meta = {};             // signer/role/date/contact
let signature = {};        // declare/sigName/sigDate
let curBrand = 0;
let curIdx = 0;            // wizard index within brand (counts only answerable)
let viewMode = "wizard";   // wizard | overview

function loadState(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(raw){
      const o = JSON.parse(raw);
      answers = o.answers||{}; meta = o.meta||{}; signature = o.signature||{};
    }
  }catch(e){ console.warn("load failed", e); }
}
function saveState(){
  try{
    localStorage.setItem(LS_KEY, JSON.stringify({answers, meta, signature, ts:Date.now()}));
    flashSaved();
  }catch(e){ console.warn("save failed", e); }
}
let savedTimer=null;
function flashSaved(){
  const el = document.getElementById("savedTip");
  el.textContent = "✓ 已自動儲存 "+new Date().toLocaleTimeString();
  clearTimeout(savedTimer);
  savedTimer = setTimeout(()=>{ el.textContent=""; }, 2500);
}

/* answerable = not decided */
function answerable(b){ return b.questions.filter(q=>!q.decided); }
function isAnswered(q){
  const a = answers[q.id];
  if(!a || !a.choice) return false;
  // require source text if the chosen option needs one
  if(q.type==="conflict"){
    return !!(a.truth && a.truth.trim());
  }
  if(q.type==="confirmEdit"){
    if(a.choice==="edit") return !!(a.edit && a.edit.trim());
    if(a.choice==="confirm") return q.confirmSource ? !!(a.source&&a.source.trim()) : true;
    return true;
  }
  // choice
  const opt = (q.opts||[]).find(o=>o.v===a.choice);
  if(opt && opt.needSource) return !!(a.source && a.source.trim());
  return true;
}
function brandDone(b){ return answerable(b).filter(isAnswered).length; }
function brandTotal(b){ return answerable(b).length; }
function totalDone(){ return BRANDS.reduce((s,b)=>s+brandDone(b),0); }
function totalAll(){ return BRANDS.reduce((s,b)=>s+brandTotal(b),0); }

/* =========================================================
   RENDER
   ========================================================= */
function buildNav(){
  const ul = document.getElementById("navList");
  ul.innerHTML = "";
  BRANDS.forEach((b,i)=>{
    const li = document.createElement("li");
    const done = brandDone(b), tot = brandTotal(b);
    if(i===curBrand) li.classList.add("active");
    if(tot>0 && done===tot) li.classList.add("done-all");
    li.innerHTML = `<span>${esc(b.name)}</span><span class="cnt">${done}/${tot}${(tot>0&&done===tot)?" ✓":""}</span>`;
    li.onclick = ()=>{ curBrand=i; curIdx=0; render(); };
    ul.appendChild(li);
  });
  // overall progress
  const done = totalDone(), tot = totalAll();
  const pct = tot? Math.round(done/tot*100):0;
  document.getElementById("ovPct").textContent = pct;
  document.getElementById("ovDone").textContent = done;
  document.getElementById("ovTotal").textContent = tot;
  document.getElementById("ovBar").style.width = pct+"%";
}

function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

function statusBadge(status){
  const m = STATUS_META[status] || STATUS_META.amber;
  return `<span class="badge ${m.cls}">${m.icon} ${esc(m.txt)}</span>`;
}

/* Build one question card (full interactive). compact=true used in overview */
function questionCard(b, q, opts){
  opts = opts||{};
  const a = answers[q.id] || {};
  const answeredFlag = (!q.decided && isAnswered(q)) ? `<span class="answered-flag">✓ 已回簽</span>` : "";
  let html = `<div class="qcard${opts.compact?" compact":""}" data-qid="${q.id}">`;
  html += `<div class="qtop">
      <span class="qid">${q.id}</span>
      ${statusBadge(q.status)}
      <span class="cat">${esc(q.cat||"")}</span>
      ${answeredFlag}
    </div>`;

  if(q.decided){
    html += `<div class="claimbox"><span class="lab">現有聲稱</span>${esc(q.claim)}</div>`;
    html += `<div class="claimbox" style="border-left-color:var(--ok);background:#f3fbf6">${esc(q.decision)}</div>`;
    html += `</div>`;
    return html;
  }

  // claim
  html += `<div class="claimbox"><span class="lab">現有聲稱 / 原 claim</span>${esc(q.claim)}</div>`;

  // conflict versions
  if(q.type==="conflict"){
    html += `<div class="versions">
      <div class="ver va"><div class="vt">A 版（Landing /sea-urchin）</div>${esc(q.verA)}</div>
      <div class="ver vb"><div class="vt">B 版（品牌頁）</div>${esc(q.verB)}</div>
    </div>`;
    const tl = q.truthLabel || "真實值 ＝";
    html += `<div class="truthval">
      <label>${esc(tl)}</label>
      <input type="text" data-field="truth" data-qid="${q.id}" value="${esc(a.truth||"")}" placeholder="填寫單一真實版本">
    </div>`;
    html += `</div>`;
    return html;
  }

  // answer options
  html += `<div class="ans">`;

  if(q.type==="confirmEdit"){
    html += `<div class="opts">`;
    html += optionRow(q, "confirm", "✅ "+(q.confirmLabel||"確認屬實"), "", a.choice==="confirm", "sel-confirm");
    html += optionRow(q, "edit", "✏️ "+(q.editLabel||"修正為"), "", a.choice==="edit", "sel-edit");
    html += `</div>`;
    // confirm source (optional/required)
    if(q.confirmSource){
      html += condBox(q, "source", q.sourceLabel||"來源 ＝", a.source, a.choice==="confirm");
    }
    html += condBox(q, "edit", "修正內容（＋來源）", a.edit, a.choice==="edit", true);
  } else {
    // generic choice
    html += `<div class="opts">`;
    (q.opts||[]).forEach(o=>{
      let sel = a.choice===o.v;
      let cls = o.v==="confirm"||o.v==="a"||o.v==="real"||o.v==="evidence" ? "sel-confirm"
              : (o.v==="delete" ? "sel-delete" : "sel-edit");
      html += optionRow(q, o.v, optLabel(o), o.d||"", sel, cls);
    });
    html += `</div>`;
    // conditional source boxes for options that need source
    (q.opts||[]).forEach(o=>{
      if(o.needSource){
        html += condBox(q, "source", o.sourceLabel||"來源 ＝", a.source, a.choice===o.v);
      }
    });
  }

  html += `</div></div>`;
  return html;
}

function optLabel(o){
  const icon = (o.v==="confirm"||o.v==="a"||o.v==="real"||o.v==="evidence") ? "✅"
             : (o.v==="delete") ? "🗑"
             : (o.v==="confirm"&&false) ? "" : "✏️";
  // refine: confirm-ish -> ✅, delete -> 🗑, else ✏️
  let ic = "✏️";
  if(["confirm","a","b","real","evidence"].includes(o.v)) ic="✅";
  else if(o.v==="delete") ic="🗑";
  else if(["soften","sample","rename","anon","roadmap","note","keep"].includes(o.v)) ic="✏️";
  return `${ic} ${esc(o.t)}`;
}

function optionRow(q, val, label, desc, sel, selCls){
  return `<label class="opt${sel?" "+selCls:""}" data-opt="${val}" data-qid="${q.id}">
    <input type="radio" name="opt_${q.id}" value="${val}" ${sel?"checked":""} data-qid="${q.id}">
    <span><span class="ot">${label}</span>${desc?` <span class="od">— ${esc(desc)}</span>`:""}</span>
  </label>`;
}

function condBox(q, field, label, val, show, textarea){
  const inputEl = textarea
    ? `<textarea data-field="${field}" data-qid="${q.id}" placeholder="${esc(label)}">${esc(val||"")}</textarea>`
    : `<input type="text" data-field="${field}" data-qid="${q.id}" value="${esc(val||"")}" placeholder="${esc(label)}">`;
  return `<div class="cond${show?" show":""}" data-cond="${field}" data-qid="${q.id}">
    <label>${esc(label)}</label>${inputEl}
  </div>`;
}

/* ---- main render dispatcher ---- */
function render(){
  buildNav();
  const main = document.getElementById("mainArea");
  const b = BRANDS[curBrand];
  const ans = answerable(b);

  let html = `<div class="brandhead">
      <div>
        <h2>${esc(b.id)}. ${esc(b.name)}</h2>
        <div class="bdesc">${esc(b.full)}</div>
      </div>
      <div class="bdesc">本品牌待回簽 ${brandDone(b)} / ${brandTotal(b)}</div>
    </div>`;

  // toolbar
  html += `<div class="toolbar">
      <span class="toggle">
        <button id="tgWiz" class="${viewMode==='wizard'?'on':''}">逐條回答</button>
        <button id="tgOv" class="${viewMode==='overview'?'on':''}">一覽模式</button>
      </span>
      <span class="spacer"></span>
      <button class="btn" id="btnExport">⬇ 匯出 JSON</button>
      <button class="btn" id="btnPrint">🖨 列印 / 存 PDF</button>
      <button class="btn ghost" id="btnReset">清空重填</button>
    </div>`;

  if(b.notice){ html += `<div class="notice">${esc(b.notice)}</div>`; }

  // decided cards (always shown first as reference, collapsed-ish)
  const decided = b.questions.filter(q=>q.decided);

  if(viewMode==="overview" || ans.length===0){
    // show all questions
    decided.forEach(q=>{ html += questionCard(b,q,{compact:true}); });
    ans.forEach(q=>{ html += questionCard(b,q,{compact:true}); });
    // continue to next brand / completion at end of last brand
    if(curBrand===BRANDS.length-1){
      html += completionBlock();
    } else {
      html += `<div class="wizfoot"><span></span><button class="btn primary" id="btnNextBrand">下一個品牌 →</button></div>`;
    }
  } else {
    // WIZARD: show decided (reference, compact, collapsible note) then one answerable card
    if(decided.length && curIdx===0){
      html += `<div class="notice">以下 ${decided.length} 條已處理（A1–A6），只供覆核，向下滾即見待回簽問題。</div>`;
    }
    if(curIdx>=ans.length) curIdx = ans.length-1;
    const q = ans[curIdx];
    html += questionCard(b, q, {});
    html += `<div class="wizfoot">
        <button class="btn" id="btnPrev" ${curIdx===0?"disabled":""}>← 上一條</button>
        <span class="stepinfo">第 ${curIdx+1} / ${ans.length} 條（${esc(b.name)}）</span>
        ${nextBtn(b, ans)}
      </div>`;
  }

  main.innerHTML = html;
  wireMain();
  if(viewMode==="wizard"){ window.scrollTo({top:0, behavior:"smooth"}); }
}

function nextBtn(b, ans){
  if(curIdx < ans.length-1){
    return `<button class="btn primary" id="btnNext">下一條 →</button>`;
  }
  // last question of this brand
  if(curBrand < BRANDS.length-1){
    return `<button class="btn primary" id="btnNextBrand">下一個品牌 →</button>`;
  }
  return `<button class="btn primary" id="btnFinish">前往完成頁 →</button>`;
}

function completionBlock(){
  const done = totalDone(), tot = totalAll();
  // breakdown counts
  let cnt={confirm:0,edit:0,delete:0,other:0};
  BRANDS.forEach(b=>answerable(b).forEach(q=>{
    const a=answers[q.id];
    if(!a||!a.choice) return;
    if(q.type==="conflict"){ if(a.truth&&a.truth.trim()) cnt.edit++; return; }
    if(a.choice==="confirm"||a.choice==="a"||a.choice==="b"||a.choice==="real"||a.choice==="evidence") cnt.confirm++;
    else if(a.choice==="delete") cnt.delete++;
    else if(a.choice==="edit") cnt.edit++;
    else cnt.other++;
  }));
  let rows = "";
  BRANDS.forEach(b=>{
    rows += `<tr><td>${esc(b.id)}. ${esc(b.name)}</td><td>${brandDone(b)} / ${brandTotal(b)}</td></tr>`;
  });
  return `<div class="complete" id="completeBlock">
    <h2>✅ 回簽完成頁</h2>
    <div class="bdesc">已回簽 ${done} / ${tot} 條。各品牌進度：</div>
    <div class="pillbar">
      <span class="pill c">確認 ${cnt.confirm}</span>
      <span class="pill e">修正 / 填值 ${cnt.edit}</span>
      <span class="pill d">刪除 ${cnt.delete}</span>
      <span class="pill u">其他 ${cnt.other}</span>
    </div>
    <table class="summary-tbl"><tr><th>品牌</th><th>已回簽 / 共</th></tr>${rows}</table>

    <div class="declare">
      <strong>回簽確認聲明</strong><br>
      本人確認以上各項回簽內容屬實。凡標示「✅ 確認屬實」者，本人已提供或可提供相應來源 / 根據；
      凡「✏️ 修正」者以本人填寫之版本為準；凡「🗑 刪除」者同意自對外頁面移除。
      授權 CloudPipe 將以上「確認屬實＋有源」項目寫入 brand_facts（status=VERIFIED，verified_by=CEO），
      並據此更新對外頁面與 generator SSOT。
    </div>

    <div class="sig-grid">
      <div>
        <label>回簽人簽署（正楷姓名）</label>
        <input type="text" id="sigName" value="${esc(signature.sigName||"")}" placeholder="姓名">
        <div class="sig-line"></div>
      </div>
      <div>
        <label>日期</label>
        <input type="text" id="sigDate" value="${esc(signature.sigDate||"")}" placeholder="YYYY-MM-DD">
        <div class="sig-line"></div>
      </div>
    </div>

    <div class="toolbar" style="margin-top:18px">
      <button class="btn primary" id="btnExport2">⬇ 匯出 JSON（交回 CloudPipe）</button>
      <button class="btn" id="btnPrint2">🖨 列印 / 存 PDF</button>
    </div>
  </div>`;
}

/* =========================================================
   EVENT WIRING
   ========================================================= */
function wireMain(){
  // toggle view
  byId("tgWiz", el=>el.onclick=()=>{ viewMode="wizard"; render(); });
  byId("tgOv", el=>el.onclick=()=>{ viewMode="overview"; render(); });

  byId("btnExport", el=>el.onclick=exportJSON);
  byId("btnExport2", el=>el.onclick=exportJSON);
  byId("btnPrint", el=>el.onclick=printAll);
  byId("btnPrint2", el=>el.onclick=printAll);
  byId("btnReset", el=>el.onclick=resetAll);

  byId("btnPrev", el=>el.onclick=()=>{ if(curIdx>0){curIdx--;render();} });
  byId("btnNext", el=>el.onclick=()=>{ curIdx++; render(); });
  byId("btnNextBrand", el=>el.onclick=()=>{ if(curBrand<BRANDS.length-1){curBrand++;curIdx=0;render();} });
  byId("btnFinish", el=>el.onclick=()=>{ viewMode="overview"; curBrand=BRANDS.length-1; render(); setTimeout(()=>{ const c=document.getElementById("completeBlock"); if(c)c.scrollIntoView({behavior:"smooth"}); },60); });

  // radios
  document.querySelectorAll('input[type=radio][data-qid]').forEach(r=>{
    r.onchange = ()=>{
      const qid = r.dataset.qid;
      answers[qid] = answers[qid]||{};
      answers[qid].choice = r.value;
      saveState();
      render();  // re-render to update conditional boxes + nav counts
    };
  });

  // text fields (source / edit / truth)
  document.querySelectorAll('[data-field][data-qid]').forEach(inp=>{
    inp.oninput = ()=>{
      const qid = inp.dataset.qid, f = inp.dataset.field;
      answers[qid] = answers[qid]||{};
      answers[qid][f] = inp.value;
      // debounce save + light nav update (no full re-render to keep focus)
      scheduleSave();
      updateNavOnly();
    };
  });

  // meta fields
  bindMeta("metaSigner","signer"); bindMeta("metaRole","role");
  bindMeta("metaDate","date"); bindMeta("metaContact","contact");
  // signature fields
  byId("sigName", el=>{ el.oninput=()=>{ signature.sigName=el.value; scheduleSave(); }; });
  byId("sigDate", el=>{ el.oninput=()=>{ signature.sigDate=el.value; scheduleSave(); }; });
}

function bindMeta(id, key){
  const el = document.getElementById(id);
  if(!el) return;
  el.value = meta[key]||"";
  el.oninput = ()=>{ meta[key]=el.value; scheduleSave(); };
}

let saveTimer=null;
function scheduleSave(){ clearTimeout(saveTimer); saveTimer=setTimeout(saveState, 400); }

function updateNavOnly(){
  // lightweight: only refresh counters/progress without rebuilding cards
  buildNav();
}

function byId(id, fn){ const el=document.getElementById(id); if(el && fn) fn(el); return el; }

/* =========================================================
   EXPORT / PRINT / RESET
   ========================================================= */
function buildExportObject(){
  const out = {
    document:"CloudPipe 品牌事實核實回簽",
    generated:"2026-06-21",
    exported_at:new Date().toISOString(),
    signer:meta,
    signature:signature,
    progress:{ answered:totalDone(), total:totalAll() },
    brands:[]
  };
  BRANDS.forEach(b=>{
    const be = { id:b.id, name:b.name, full:b.full, questions:[] };
    b.questions.forEach(q=>{
      if(q.decided){
        be.questions.push({ id:q.id, status:"handled", claim:q.claim, decision:q.decision });
        return;
      }
      const a = answers[q.id]||{};
      const rec = { id:q.id, status:q.status, category:q.cat, claim:q.claim,
        answered:isAnswered(q), response:a.choice||null };
      if(q.type==="conflict"){ rec.version_a=q.verA; rec.version_b=q.verB; rec.true_value=a.truth||null; }
      if(a.source) rec.source = a.source;
      if(a.edit) rec.correction = a.edit;
      be.questions.push(rec);
    });
    out.brands.push(be);
  });
  return out;
}

function exportJSON(){
  const obj = buildExportObject();
  const blob = new Blob([JSON.stringify(obj,null,2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const stamp = (meta.date||new Date().toISOString().slice(0,10)).replace(/[^0-9-]/g,"")||"export";
  a.href = url; a.download = "brand-fact-signoff_"+stamp+".json";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 1500);
}

/* Print: render EVERY brand + every question into a hidden print container */
function printAll(){
  const host = document.getElementById("printHost") || (function(){
    const d=document.createElement("div"); d.id="printHost"; document.body.appendChild(d); return d;
  })();
  let html = `<main class="main" id="printAll">`;
  BRANDS.forEach(b=>{
    html += `<div class="brandhead"><div><h2>${esc(b.id)}. ${esc(b.name)}</h2><div class="bdesc">${esc(b.full)}</div></div></div>`;
    if(b.notice) html += `<div class="notice">${esc(b.notice)}</div>`;
    b.questions.forEach(q=>{ html += questionCard(b,q,{compact:true}); });
  });
  html += completionBlock();
  html += `</main>`;
  host.innerHTML = html;
  // hide live main, show print host
  document.getElementById("mainArea").style.display="none";
  host.style.display="block";
  window.print();
  // restore
  setTimeout(()=>{ host.style.display="none"; host.innerHTML=""; document.getElementById("mainArea").style.display=""; }, 300);
}

function resetAll(){
  if(!confirm("確定清空所有回簽答案？此動作無法復原。")) return;
  answers={}; signature={};
  localStorage.removeItem(LS_KEY);
  saveState();
  curBrand=0; curIdx=0; viewMode="wizard";
  render();
}

/* =========================================================
   INIT
   ========================================================= */
(function init(){
  loadState();
  // restore meta inputs in header
  ["metaSigner","metaRole","metaDate","metaContact"].forEach((id,i)=>{
    const key=["signer","role","date","contact"][i];
    const el=document.getElementById(id);
    if(el){ el.value=meta[key]||""; el.oninput=()=>{ meta[key]=el.value; scheduleSave(); }; }
  });
  render();
})();
</script>
